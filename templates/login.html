<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyapar Sahayak - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f1923;
  --ink-soft: #3d4f5c;
  --muted: #758797;
  --line: #e3ebf2;
  --surface: #f6f8fb;
  --white: #ffffff;
  --saffron: #e8500a;
  --saffron-dark: #c94206;
  --green: #0a7a3e;
  --danger: #c92020;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: "Plus Jakarta Sans", Arial, sans-serif;
  background: var(--surface);
  color: var(--ink);
}

.page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1fr);
}

.panel {
  background: var(--ink);
  color: var(--white);
  padding: 56px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: "Sora", sans-serif;
  font-weight: 700;
  font-size: 20px;
}

.brand-mark {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  background: var(--saffron);
  display: grid;
  place-items: center;
  font-weight: 800;
}

.panel-copy {
  max-width: 430px;
}

.panel-copy h1 {
  font-family: "Sora", sans-serif;
  font-size: 42px;
  line-height: 1.15;
  margin-bottom: 18px;
}

.panel-copy p {
  color: rgba(255,255,255,0.68);
  font-size: 16px;
  line-height: 1.7;
}

.panel-footer {
  color: rgba(255,255,255,0.48);
  font-size: 13px;
}

.auth-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 42px 22px;
}

.auth-card {
  width: 100%;
  max-width: 410px;
}

.auth-title {
  font-family: "Sora", sans-serif;
  font-size: 29px;
  line-height: 1.2;
  margin-bottom: 8px;
}

.auth-subtitle {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 28px;
}

.message {
  display: none;
  padding: 11px 13px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.45;
  margin-bottom: 16px;
}

.message.error {
  display: block;
  background: #fff0f0;
  color: var(--danger);
  border: 1px solid #ffd4d4;
}

.message.success {
  display: block;
  background: #effaf4;
  color: var(--green);
  border: 1px solid #caecd8;
}

.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 7px;
}

.field input {
  width: 100%;
  height: 46px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  padding: 0 13px;
  background: var(--white);
  color: var(--ink);
  font: inherit;
  font-size: 14px;
  outline: none;
}

.field input:focus {
  border-color: var(--saffron);
  box-shadow: 0 0 0 3px rgba(232,80,10,0.12);
}

.submit {
  width: 100%;
  height: 48px;
  border: 0;
  border-radius: 8px;
  background: var(--saffron);
  color: var(--white);
  font: inherit;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 4px;
}

.submit:hover { background: var(--saffron-dark); }
.submit:disabled { opacity: 0.65; cursor: not-allowed; }

.hint {
  margin-top: 18px;
  color: var(--muted);
  font-size: 13px;
  text-align: center;
}

@media (max-width: 820px) {
  .page { grid-template-columns: 1fr; }
  .panel { display: none; }
  .auth-wrap { min-height: 100vh; }
}
</style>
</head>
<body>
<main class="page">
  <section class="panel" aria-label="Vyapar Sahayak">
    <div class="brand">
      <div class="brand-mark">VS</div>
      <span>Vyapar Sahayak</span>
    </div>
    <div class="panel-copy">
      <h1>Business login for your AI assistant</h1>
      <p>Sign in to manage chat, stock, sales records, invoices, and customer work from one dashboard.</p>
    </div>
    <div class="panel-footer">Built for small business workflows.</div>
  </section>

  <section class="auth-wrap">
    <div class="auth-card">
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle" id="auth-subtitle">Login to continue to your dashboard.</p>

      <div id="message" class="message" role="alert"></div>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" placeholder="Enter password" required>
        </div>
        <button class="submit" type="submit">Login</button>
      </form>

      <p class="hint">Use logout from the dashboard to return to this page.</p>
    </div>
  </section>
</main>

<script>
const loginForm = document.getElementById("login-form");
const message = document.getElementById("message");

function showMessage(type, text) {
  message.className = `message ${type}`;
  message.textContent = text;
}

function hideMessage() {
  message.className = "message";
  message.textContent = "";
}

function setLoading(form, isLoading, label) {
  const button = form.querySelector(".submit");
  button.disabled = isLoading;
  button.textContent = isLoading ? "Please wait..." : label;
}

async function postJson(url, payload) {
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  let data = {};
  try {
    data = await response.json();
  } catch (error) {
    throw new Error("Server returned an invalid response.");
  }

  if (!response.ok || !data.success) {
    throw new Error(data.error || "Request failed. Please try again.");
  }

  return data;
}

loginForm.addEventListener("submit", async event => {
  event.preventDefault();
  hideMessage();

  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;

  if (!email || !password) {
    showMessage("error", "Email and password are required.");
    return;
  }

  setLoading(loginForm, true, "Login");
  try {
    const data = await postJson("/auth/login", { email, password });
    window.location.href = data.redirect || "/";
  } catch (error) {
    showMessage("error", error.message);
  } finally {
    setLoading(loginForm, false, "Login");
  }
});
</script>
</body>
</html>
